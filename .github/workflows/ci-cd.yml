name: CI/CD Pipeline with Self-Healing Mechanisms

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: 'grade-management'
  BUILD_TIMEOUT_MINUTES: '10'
  TEST_TIMEOUT_MINUTES: '10'
  PACKAGE_TIMEOUT_MINUTES: '5'
  DEPLOY_TIMEOUT_MINUTES: '5'
  MAX_RETRIES: '3'

jobs:

  m14-risk-assessment:
    name: "M14 — Proactive Failure Risk Assessment"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      warning: ${{ steps.m14.outputs.warning }}
      risk_score: ${{ steps.m14.outputs.risk_score }}
      risk_level: ${{ steps.m14.outputs.risk_level }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install M14 dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q pandas numpy scikit-learn joblib requests

      - name: Run M14 proactive predictor
        id: m14
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          M14_THRESHOLD: '0.725'
          M14_MODE: 'warning_only'
        run: |
          echo "=== M14: Proactive Failure Risk Assessment ==="
          if [ ! -f "scripts/m14_predict.py" ] || [ ! -f "models/m14_model.pkl" ] || [ ! -f "models/m14_config.pkl" ]; then
            echo "WARNING: M14 model files not found - skipping (warning-only mode)"
            echo '{"status":"skipped","reason":"model_files_not_found","risk_score":0,"risk_level":"unknown","warning":false}' > m14_risk_report.json
          else
            python scripts/m14_predict.py \
              --platform github \
              --repository "${{ github.repository }}" \
              --commit "${{ github.sha }}" \
              --branch "${{ github.ref_name }}" \
              --event "${{ github.event_name }}" \
              --model models/m14_model.pkl \
              --config models/m14_config.pkl \
              --output m14_risk_report.json
          fi
          cat m14_risk_report.json
          WARNING=$(python -c "import json; print(str(json.load(open('m14_risk_report.json')).get('warning', False)).lower())")
          SCORE=$(python -c "import json; print(json.load(open('m14_risk_report.json')).get('risk_score', 0))")
          LEVEL=$(python -c "import json; print(json.load(open('m14_risk_report.json')).get('risk_level', 'unknown'))")
          echo "warning=$WARNING" >> "$GITHUB_OUTPUT"
          echo "risk_score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "risk_level=$LEVEL" >> "$GITHUB_OUTPUT"

      - name: Upload M14 risk report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m14-risk-report-${{ github.run_number }}
          path: m14_risk_report.json
          retention-days: 30

  environment-verification:
    name: "M9 — Environment Variable Verification"
    runs-on: ubuntu-latest
    needs: m14-risk-assessment
    timeout-minutes: 2
    steps:
      - name: Verify required environment variables
        run: |
          echo "=== Environment Variable Verification ==="
          MISSING=""
          check_var() {
            local name=$1 value=$2
            if [ -z "$value" ]; then echo "MISSING: $name"; MISSING="$MISSING $name"
            else echo "OK: $name = $value"; fi
          }
          check_var "PYTHON_VERSION"        "${{ env.PYTHON_VERSION }}"
          check_var "APP_NAME"              "${{ env.APP_NAME }}"
          check_var "BUILD_TIMEOUT_MINUTES" "${{ env.BUILD_TIMEOUT_MINUTES }}"
          check_var "TEST_TIMEOUT_MINUTES"  "${{ env.TEST_TIMEOUT_MINUTES }}"
          if [ -n "$MISSING" ]; then
            echo "FAILURE: Required variables missing: $MISSING"
            exit 1
          fi
          echo "All environment variables verified successfully."

  configuration-validation:
    name: "M8 — Configuration Validation Gate"
    runs-on: ubuntu-latest
    needs: environment-verification
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate requirements.txt structure
        run: |
          echo "=== Validating requirements.txt ===" | tee -a config_validation.log
          if [ ! -f "requirements.txt" ]; then
            echo "FAILURE: requirements.txt not found at repository root" | tee -a config_validation.log
            exit 1
          fi
          for pkg in "Flask" "Flask-SQLAlchemy" "pytest"; do
            if grep -qi "^${pkg}" requirements.txt; then
              echo "OK: $pkg found in requirements.txt" | tee -a config_validation.log
            else
              echo "FAILURE: $pkg missing from requirements.txt" | tee -a config_validation.log
              exit 1
            fi
          done
          echo "requirements.txt validation passed." | tee -a config_validation.log

      - name: Validate app configuration
        run: |
          echo "=== Validating app/__init__.py configuration ===" | tee -a config_validation.log
          if [ ! -f "app/__init__.py" ]; then
            echo "FAILURE: app/__init__.py not found" | tee -a config_validation.log
            exit 1
          fi
          for key in "SQLALCHEMY_DATABASE_URI" "APP_NAME" "SERVER_PORT"; do
            if grep -q "$key" app/__init__.py; then
              echo "OK: $key found in app config" | tee -a config_validation.log
            else
              echo "FAILURE: Required config key '$key' missing from app/__init__.py" | tee -a config_validation.log
              exit 1
            fi
          done
          echo "Configuration validation passed." | tee -a config_validation.log

      - name: Upload config validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config-validation-log-${{ github.run_number }}
          path: config_validation.log
          if-no-files-found: ignore
          retention-days: 30

  build:
    name: "Stage 1 — Build"
    runs-on: ubuntu-latest
    needs: configuration-validation
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies (M11)
        uses: actions/cache@v4
        id: pip-cache
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Report cache status
        run: |
          if [ "${{ steps.pip-cache.outputs.cache-hit }}" == "true" ]; then
            echo "M11: Cache hit — using cached dependencies"
          else
            echo "M11: Cache miss — downloading fresh dependencies"
          fi

      - name: Install dependencies with retry (M1 + M2)
        id: install-deps
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: ${{ env.BUILD_TIMEOUT_MINUTES }}
          max_attempts: ${{ env.MAX_RETRIES }}
          retry_on: error
          command: |
            python -m pip install --upgrade pip 2>&1 | tee -a build.log
            pip install -r requirements.txt 2>&1 | tee -a build.log
            PIP_EXIT=${PIPESTATUS[0]}
            if [ $PIP_EXIT -ne 0 ]; then
              echo "M2: Primary install failed, attempting fallback without version pins..." | tee -a build.log
              pip install Flask Flask-SQLAlchemy pytest pytest-cov 2>&1 | tee -a build.log
              PIP_EXIT=${PIPESTATUS[0]}
            fi
            exit $PIP_EXIT

      - name: Verify app imports cleanly
        run: |
          python -c "from app import create_app; app = create_app(); print('OK: app factory loaded')" 2>&1 | tee -a build.log
          exit ${PIPESTATUS[0]}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Notify on build failure (M3)
        if: failure()
        run: |
          echo "=== M3: Build Failure Notification ==="
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "ACTION REQUIRED: Build failed after ${{ env.MAX_RETRIES }} retries."

  test:
    name: "Stage 2 — Test"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test-results directory
        run: mkdir -p test-results

      - name: Run tests with retry (M4)
        id: run-tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: ${{ env.TEST_TIMEOUT_MINUTES }}
          max_attempts: ${{ env.MAX_RETRIES }}
          retry_on: error
          command: |
            python -m pytest tests/ \
              --tb=short \
              --junitxml=test-results/junit.xml \
              -v 2>&1 | tee -a test.log
            EXIT_CODE=${PIPESTATUS[0]}
            if [ $EXIT_CODE -ne 0 ]; then
              TIMESTAMP=$(date -u +%H:%M:%S)
              echo "ATTEMPT_FAILED at $TIMESTAMP (exit_code=$EXIT_CODE)" >> flaky_failure_log.txt
              grep -h "FAILED\|ERROR\|Exception\|RuntimeError\|AssertionError" test.log 2>/dev/null \
                >> flaky_failure_log.txt || true
            fi
            exit $EXIT_CODE
          continue_on_error: false

      - name: Analyse test results for flakiness (M5)
        if: always()
        run: |
          echo "=== M5: Flaky Test Quarantine Analysis ==="
          FLAG_FILE="flaky_failure_log.txt"
          JUNIT="test-results/junit.xml"

          FINAL_FAILURES=0
          if [ -f "$JUNIT" ]; then
            FINAL_FAILURES=$(python -c "
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse('$JUNIT')
              root = tree.getroot()
              suite = root if root.tag == 'testsuite' else root.find('testsuite')
              if suite is None: suite = root
              print(int(suite.get('failures',0)) + int(suite.get('errors',0)))
          except Exception:
              print(0)
          " 2>/dev/null || echo 0)
          fi

          FLAG_HAS_CONTENT=false
          if [ -f "$FLAG_FILE" ] && [ -s "$FLAG_FILE" ]; then
            FLAG_HAS_CONTENT=true
          fi

          if $FLAG_HAS_CONTENT && [ "$FINAL_FAILURES" -eq 0 ]; then
            echo "M5: FLAKY TEST DETECTED — failed on attempt(s) but passed on retry"
            cat "$FLAG_FILE"
            echo "Classification: FLAKY CANDIDATE"
          elif $FLAG_HAS_CONTENT && [ "$FINAL_FAILURES" -gt 0 ]; then
            echo "M5: DETERMINISTIC FAILURE (failed on all attempts)"
            cat "$FLAG_FILE"
          else
            echo "M5: All tests passed on first attempt — no flaky candidates detected"
          fi

      - name: Test result trend analysis (M6)
        if: always()
        run: |
          echo "=== M6: Test Result Trend Analysis ==="
          JUNIT="test-results/junit.xml"
          if [ ! -f "$JUNIT" ]; then
            echo "No JUnit report — parsing test.log"
            [ -f "test.log" ] && grep -E "passed|failed|error" test.log | tail -3 || true
            exit 0
          fi
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$JUNIT')
          root = tree.getroot()
          suite = root if root.tag == 'testsuite' else root.find('testsuite')
          if suite is None: suite = root
          total  = int(suite.get('tests', 0))
          failed = int(suite.get('failures', 0))
          errors = int(suite.get('errors', 0))
          passed = total - failed - errors
          print(f'Tests run: {total} | Passed: {passed} | Failed: {failed} | Errors: {errors}')
          print('TREND ALERT: Test failures detected.' if failed+errors > 0 else 'TREND OK: All tests passed.')
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log-${{ github.run_number }}
          path: test.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload flaky failure log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-failure-log-${{ github.run_number }}
          path: flaky_failure_log.txt
          if-no-files-found: ignore
          retention-days: 30

  package:
    name: "Stage 3 — Package"
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt build wheel

      - name: Build distributable wheel
        run: |
          python -m build --wheel --outdir dist/
          echo "=== dist/ contents ==="
          ls -lh dist/

      - name: Verify wheel artifact exists
        run: |
          WHEEL=$(find dist -name "*.whl" | head -1)
          if [ -z "$WHEEL" ]; then
            echo "FAILURE: No wheel artifact found in dist/"
            exit 1
          fi
          echo "Wheel artifact produced: $WHEEL"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: grade-management-wheel-${{ github.run_number }}
          path: dist/*.whl
          retention-days: 30

  deploy:
    name: "Stage 4 — Deploy"
    runs-on: ubuntu-latest
    needs: package
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: grade-management-wheel-${{ github.run_number }}
          path: dist/

      - name: Simulate deployment
        run: |
          echo "=== Deploying grade-management ==="
          WHEEL=$(find dist -name "*.whl" | head -1)
          echo "Deploying artifact: $WHEEL"
          echo "Build number: ${{ github.run_number }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Deployment successful."

      - name: Rollback on deployment failure (M7)
        if: failure()
        run: |
          echo "=== M7: Automated Rollback Initiated ==="
          git log --oneline -5
          git log --oneline -1 HEAD~1 || echo "No previous commit available for rollback"

  anomaly-detection:
    name: "M13 — ML Failure Classification"
    runs-on: ubuntu-latest
    needs: [ configuration-validation, build, test, package ]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install M13 dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q pandas numpy scikit-learn joblib

      - name: Download config validation log
        uses: actions/download-artifact@v4
        with:
          name: config-validation-log-${{ github.run_number }}
          path: logs/
        continue-on-error: true

      - name: Download build log
        uses: actions/download-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: logs/
        continue-on-error: true

      - name: Download test log
        uses: actions/download-artifact@v4
        with:
          name: test-log-${{ github.run_number }}
          path: logs/
        continue-on-error: true

      - name: Download flaky failure log
        uses: actions/download-artifact@v4
        with:
          name: flaky-failure-log-${{ github.run_number }}
          path: logs/
        continue-on-error: true

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: logs/test-results/
        continue-on-error: true

      - name: Run M13 ML classifier
        run: |
          echo "=== M13: ML Failure Classification ==="

          python -c "
          import json
          status = {
              'platform':      'github',
              'workflow':      '${{ github.workflow }}',
              'run_id':        '${{ github.run_id }}',
              'run_number':    '${{ github.run_number }}',
              'commit':        '${{ github.sha }}',
              'branch':        '${{ github.ref_name }}',
              'event':         '${{ github.event_name }}',
              'config_status': '${{ needs.configuration-validation.result }}',
              'build_status':  '${{ needs.build.result }}',
              'test_status':   '${{ needs.test.result }}',
              'package_status':'${{ needs.package.result }}',
          }
          print(json.dumps(status, indent=2))
          open('pipeline_status.json', 'w').write(json.dumps(status, indent=2))
          "

          echo "--- pipeline_status.json ---"
          cat pipeline_status.json
          echo "--- available logs ---"
          find logs -maxdepth 3 -type f -print 2>/dev/null || true

          if [ -f "scripts/m13_predict.py" ] && [ -f "models/m13_model_bundle.pkl" ]; then
            python scripts/m13_predict.py \
              --status pipeline_status.json \
              --logs logs \
              --model-bundle models/m13_model_bundle.pkl \
              --output m13_classification_report.json
          else
            echo "WARNING: M13 model files not found — generating placeholder report"
            python -c "
          import json
          ps = json.load(open('pipeline_status.json'))
          report = {'status':'skipped','reason':'model_files_not_found','pipeline_status':ps}
          print(json.dumps(report, indent=2))
          open('m13_classification_report.json','w').write(json.dumps(report, indent=2))
          "
          fi

          cat m13_classification_report.json

      - name: Upload M13 classification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m13-classification-report-${{ github.run_number }}
          path: |
            m13_classification_report.json
            pipeline_status.json
          retention-days: 30
